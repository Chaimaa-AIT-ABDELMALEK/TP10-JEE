<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Espace Utilisateur</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f6fa;
            text-align: center;
            margin-top: 80px;
        }

        .container {
            background: #ffffff;
            padding: 25px;
            border-radius: 10px;
            width: 350px;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        button {
            margin-top: 15px;
            padding: 8px 18px;
            border: none;
            border-radius: 5px;
            background-color: #2b5797;
            color: white;
            cursor: pointer;
        }

        h2 {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>Zone Utilisateur</h2>

    <p>
        Accès autorisé aux comptes disposant des rôles USER ou ADMIN.
    </p>

    <form th:action="@{/logout}" method="post">
        <button type="submit">Se déconnecter</button>
    </form>

</div>

</body>
</html>
